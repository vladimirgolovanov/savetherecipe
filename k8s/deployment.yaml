apiVersion: apps/v1
kind: Deployment
metadata:
  name: savetherecipe
  namespace: savetherecipe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: savetherecipe
  template:
    metadata:
      labels:
        app: savetherecipe
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: savetherecipe
          image: ghcr.io/vladimirgolovanov/savetherecipe/savetherecipe:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: savetherecipe-env
          ports:
            - containerPort: 8088
---
apiVersion: v1
kind: Service
metadata:
  name: savetherecipe
  namespace: savetherecipe
spec:
  selector:
    app: savetherecipe
  ports:
    - port: 8088
      targetPort: 8088
